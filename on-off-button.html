<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
    <style>
        .on-button{
            background-color: rgb(25, 135, 84);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        .off-button{
            background-color: rgb(220, 53, 69);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="./react-basics.js"></script>
    <script src="https://unpkg.com/supersimpledev@8.6.4/external-library.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function App(){
        const[isButtonOn, setIsButtonOn] = React.useState(true);
        function switchButton(){
            if(isButtonOn){
                setIsButtonOn(false);
            }else{
                setIsButtonOn(true);
            }
        }
        return(
            <>
                <button 
                    className={isButtonOn ? "on-button" : "off-button"} 
                    onClick={switchButton}
                >{isButtonOn ? 'ON' : "OFF"}</button>
            </>
        );

      }
      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App/>);
    </script>
  </body>
</html>
