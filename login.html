<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        .title{
            font-size: 25px;
        }
        .btn{
            background-color: rgb(0, 123, 255);
            color: white;
            margin-right: 5px;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        .input-box{
            padding: 10px 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            border-width: 1px;
            width: 200px;
        }
        .show-button{
            margin-left: 10px;
        }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="./react-basics.js"></script>
    <script src="https://unpkg.com/supersimpledev@8.6.4/external-library.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function LoginForm(){
        const [showPassword, setShowPassword] = React.useState(false);
        function showHide(){
            setShowPassword(!showPassword);
        }
        return(
            <>
                <div>
                    <input 
                        placeholder="Email"
                        className="input-box"
                    />    
                </div>
                <div>
                    <input 
                        placeholder="Password"
                        type={showPassword ? 'text' : 'password'} 
                        className="input-box"
                    />
                    <button className="show-button" onClick={showHide}>{showPassword ? 'Hide': 'Show'}</button>
                </div>
                <button className="btn">Login</button>
                <button className="btn">Sign up</button>
            </>
        );
      }
        
      function App(){
        
        return(
            <>
                <p className="title">Hello, welcome to my website</p>
                <LoginForm />
            </>
        );
      }
      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App/>);
    </script>
  </body>
</html>
